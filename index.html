
<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>StudySpells</title>

<style>
body {
  font-family: Harry P;
  background: https://t4.ftcdn.net/jpg/01/69/42/47/360_F_169424788_SOLVBiZ3mNlVAKbXznUEfN9c5qxTxA6F.jpg
  color: white;
  text-align: center;
}

.container {
  max-width: 500px;
  margin: auto;
}

input, button {
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  border: none;
}

button {
  background: #0f172a;
  color: white;
}

li {
  list-style: none;
  margin: 10px;
  padding: 10px;
  background: #1e293b;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🪄 StudySpells</h1>

  <h2>XP: <span id="xp">0</span></h2>
  <h3>Level: <span id="level">1</span></h3>

  <input id="taskInput" placeholder="Nieuwe quest...">
  <button onclick="addTask()">Toevoegen</button>

  <ul id="taskList"></ul>
</div>

<script>
let xp = localStorage.getItem("xp") || 0;
xp = Number(xp);

function updateUI() {
  document.getElementById("xp").innerText = xp;
  document.getElementById("level").innerText = Math.floor(xp / 100) + 1;
}

function addTask() {
  const text = document.getElementById("taskInput").value;
  if (!text) return;

  const li = document.createElement("li");
  li.innerHTML = `
    ${text} (+10 XP)
    <button onclick="completeTask(this)">✅</button>
  `;

  document.getElementById("taskList").appendChild(li);
}

function completeTask(btn) {
  xp += 10;
  localStorage.setItem("xp", xp);

  btn.parentElement.style.textDecoration = "line-through";
  btn.remove();

  updateUI();
}

updateUI();
</script>

</body>
</html>
